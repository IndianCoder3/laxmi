name: Register Laxmi Commands

on:
  workflow_dispatch:

jobs:
  register:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Register commands
        run: node register-commands.js
        env:
          DISCORD_TOKEN: ${{ secrets.LAXMI_DISCORD_TOKEN }}
          DISCORD_APPLICATION_ID: ${{ secrets.LAXMI_APPLICATION_ID }}
